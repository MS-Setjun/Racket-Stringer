name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'   # triggers on version tags like v1.0.1

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version info
        id: vars
        run: |
          # If this is a tag push, extract version
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT

            # Extract major version (v1)
            MAJOR="${VERSION%%.*}"
            echo "major=$MAJOR" >> $GITHUB_OUTPUT
          else
            echo "version=" >> $GITHUB_OUTPUT
            echo "major=" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ms-setjun/racket-stringing-app:latest
            ghcr.io/ms-setjun/racket-stringing-app:${{ github.sha }}
            ${{ steps.vars.outputs.version && format('ghcr.io/ms-setjun/racket-stringing-app:{0}', steps.vars.outputs.version) }}
            ${{ steps.vars.outputs.major && format('ghcr.io/ms-setjun/racket-stringing-app:{0}', steps.vars.outputs.major) }}
